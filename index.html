<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InsightPanel</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <script>
        // 1. URL base de tu Google Apps Script (Asegúrate de que sea la de la "Nueva Implementación")
        const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyGgo19E2PZ-eWwbHDyEV0B3qRTw5LeZLIKy6rCigZQHUNzOX1Yb8NJ-BQIog3YVPFV/exec";
        
        // 2. Capturar el token de la URL de GitHub (ej: ?token=A1B2C3)
        const queryString = window.location.search;
        
        // 3. Construir la URL final con los parámetros para el servidor de Google
        const finalUrl = googleScriptUrl + queryString;
        
        // 4. Crear e inyectar el iframe
        const iframe = document.createElement('iframe');
        iframe.src = finalUrl;
        iframe.style.width = "100%";
        iframe.style.height = "100%";
        iframe.setAttribute("allow", "camera; microphone; clipboard-read; clipboard-write");
        
        document.body.appendChild(iframe);
    </script>
</body>
</html>
